<!DOCTYPE html>
<html lang="en">
<head>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-CP5FDWHLR4"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-CP5FDWHLR4');
</script>
  
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GA4 Tracking Test Store</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
    }
    h1 { margin: 0 0 8px; }
    .subtitle { color: #6b7280; margin: 0; }
    .cart-summary {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px 16px;
      min-width: 180px;
    }
    .layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 24px;
    }
    .products {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    .card, .cart-box {
      background: white;
      border-radius: 16px;
      border: 1px solid #e5e7eb;
      overflow: hidden;
    }
    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      cursor: pointer;
    }
    .card-body { padding: 16px; }
    .category {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 6px;
    }
    .product-title {
      font-size: 20px;
      font-weight: bold;
      margin: 0 0 10px;
      cursor: pointer;
    }
    .price {
      font-weight: bold;
      margin-bottom: 10px;
    }
    .desc {
      color: #4b5563;
      font-size: 14px;
      min-height: 42px;
      margin-bottom: 16px;
    }
    .btn-row {
      display: flex;
      gap: 10px;
    }
    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-outline {
      background: white;
      border: 1px solid #d1d5db;
    }
    .btn-primary {
      background: #111827;
      color: white;
    }
    .cart-box {
      padding: 18px;
      height: fit-content;
      position: sticky;
      top: 20px;
    }
    .cart-item {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .cart-top {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
      margin-bottom: 10px;
    }
    .qty-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .qty-number {
      min-width: 24px;
      text-align: center;
      font-weight: bold;
    }
    .totals {
      background: #f3f4f6;
      border-radius: 12px;
      padding: 14px;
      margin-top: 16px;
    }
    .totals div {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .totals div:last-child { margin-bottom: 0; font-weight: bold; }
    .checkout {
      width: 100%;
      margin-top: 14px;
      padding: 14px;
      font-size: 16px;
    }
    .empty {
      border: 1px dashed #d1d5db;
      border-radius: 12px;
      padding: 18px;
      text-align: center;
      color: #6b7280;
    }
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-content {
      background: white;
      width: 100%;
      max-width: 800px;
      border-radius: 16px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1.1fr 1fr;
    }
    .modal-content img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .modal-body { padding: 20px; }
    .close-btn {
      background: #ef4444;
      color: white;
      margin-top: 12px;
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .products { grid-template-columns: 1fr; }
      .modal-content { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>RICHARD YANG GA4 Tracking Test Store</h1>
        <p class="subtitle">Richard Yang ecommerce page for testing GA4 product clicks, add to cart, cart updates, and checkout.</p>
      </div>
      <div class="cart-summary" id="cart-summary">
        <div><strong>Cart</strong></div>
        <div id="cart-summary-text">0 items · $0</div>
      </div>
    </header>

    <div class="layout">
      <section>
        <h2>Featured Products</h2>
        <div class="products" id="product-list"></div>
      </section>

      <aside class="cart-box">
        <h2>Shopping Cart</h2>
        <div id="cart-items"></div>
        <div class="totals">
          <div><span>Total Quantity</span><span id="total-qty">0</span></div>
          <div><span>Total Amount</span><span id="total-amount">$0</span></div>
        </div>
        <button class="btn-primary checkout" id="begin-checkout">Proceed to Checkout</button>
      </aside>
    </div>
  </div>

  <div class="modal" id="product-modal">
    <div class="modal-content">
      <img id="modal-image" src="" alt="product image" />
      <div class="modal-body">
        <h2 id="modal-title"></h2>
        <p id="modal-price"></p>
        <p id="modal-desc"></p>
        <button class="btn-primary" id="modal-add-to-cart">Add to Cart</button>
        <button class="close-btn" id="close-modal">Close</button>
      </div>
    </div>
  </div>

  <script>
    const products = [
      {
        id: 'sku-wireless-headphones',
        name: 'Wireless Headphones',
        category: 'Electronics',
        price: 89,
        description: 'Noise reduction, Bluetooth 5.3, and up to 28 hours of battery life for daily commuting and focused work.',
        image: 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=1200&q=80'
      },
      {
        id: 'sku-smart-watch',
        name: 'Smart Watch',
        category: 'Wearables',
        price: 129,
        description: 'Track your steps, heart rate, sleep, and notifications with a lightweight everyday smart watch.',
        image: 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=1200&q=80'
      },
      {
        id: 'sku-mechanical-keyboard',
        name: 'Mechanical Keyboard',
        category: 'Accessories',
        price: 109,
        description: 'Compact 75% layout with hot-swappable switches, RGB backlight, and satisfying tactile feedback.',
        image: 'https://images.unsplash.com/photo-1511467687858-23d96c32e4ae?auto=format&fit=crop&w=1200&q=80'
      },
      {
        id: 'sku-coffee-maker',
        name: 'Coffee Maker',
        category: 'Home',
        price: 149,
        description: 'Fast-brew countertop coffee maker with timer presets and a thermal carafe for busy mornings.',
        image: 'https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=1200&q=80'
      }
    ];

    const cart = {};
    let selectedProduct = null;

    function money(n) {
      return '$' + n;
    }

    function renderProducts() {
      const list = document.getElementById('product-list');
      list.innerHTML = products.map(product => `
        <div class="card" id="product-card-${product.id}">
          <img src="${product.image}" alt="${product.name}" onclick="openModal('${product.id}')">
          <div class="card-body">
            <div class="category">${product.category}</div>
            <div class="product-title" onclick="openModal('${product.id}')">${product.name}</div>
            <div class="price">${money(product.price)}</div>
            <div class="desc">${product.description}</div>
            <div class="btn-row">
              <button class="btn-outline" onclick="openModal('${product.id}')">View Details</button>
              <button class="btn-primary" onclick="addToCart('${product.id}')">Add to Cart</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function renderCart() {
      const cartItems = products.filter(p => cart[p.id] > 0);
      const container = document.getElementById('cart-items');
      const totalQty = cartItems.reduce((sum, p) => sum + cart[p.id], 0);
      const totalAmount = cartItems.reduce((sum, p) => sum + cart[p.id] * p.price, 0);

      document.getElementById('total-qty').textContent = totalQty;
      document.getElementById('total-amount').textContent = money(totalAmount);
      document.getElementById('cart-summary-text').textContent = `${totalQty} items · ${money(totalAmount)}`;

      if (cartItems.length === 0) {
        container.innerHTML = '<div class="empty">Your cart is empty. Add products to test cart and checkout events.</div>';
        return;
      }

      container.innerHTML = cartItems.map(item => `
        <div class="cart-item">
          <div class="cart-top">
            <div>
              <div><strong>${item.name}</strong></div>
              <div>${money(item.price)} each</div>
            </div>
            <button class="btn-outline" onclick="removeItem('${item.id}')">Remove</button>
          </div>
          <div class="cart-top">
            <div class="qty-controls">
              <button class="btn-outline" onclick="decreaseQty('${item.id}')">-</button>
              <span class="qty-number">${cart[item.id]}</span>
              <button class="btn-outline" onclick="addToCart('${item.id}')">+</button>
            </div>
            <div><strong>${money(cart[item.id] * item.price)}</strong></div>
          </div>
        </div>
      `).join('');
    }

function addToCart(id) {
  cart[id] = (cart[id] || 0) + 1;

  // GA4事件
  gtag('event', 'add_to_cart', {
    item_id: id
  });

  renderCart();
}

    function decreaseQty(id) {
      if (!cart[id]) return;
      cart[id] -= 1;
      if (cart[id] <= 0) delete cart[id];
      renderCart();
    }

function removeItem(id) {
  delete cart[id];

  gtag('event', 'remove_from_cart', {
    item_id: id
  });

  renderCart();
}

    function openModal(id) {
      selectedProduct = products.find(p => p.id === id);
      document.getElementById('modal-image').src = selectedProduct.image;
      document.getElementById('modal-title').textContent = selectedProduct.name;
      document.getElementById('modal-price').textContent = money(selectedProduct.price);
      document.getElementById('modal-desc').textContent = selectedProduct.description;
      document.getElementById('product-modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('product-modal').style.display = 'none';
      selectedProduct = null;
    }

    document.getElementById('close-modal').addEventListener('click', closeModal);
    document.getElementById('product-modal').addEventListener('click', function(e) {
      if (e.target.id === 'product-modal') closeModal();
    });
    document.getElementById('modal-add-to-cart').addEventListener('click', function() {
      if (selectedProduct) {
        addToCart(selectedProduct.id);
        closeModal();
      }
    });
    document.getElementById('begin-checkout').addEventListener('click', function() {
        // GA4事件
  gtag('event', 'begin_checkout');
      const totalQty = products.filter(p => cart[p.id] > 0).reduce((sum, p) => sum + cart[p.id], 0);
      const totalAmount = products.filter(p => cart[p.id] > 0).reduce((sum, p) => sum + cart[p.id] * p.price, 0);
      alert(`Checkout started. Items: ${totalQty}, Total: ${money(totalAmount)}`);
    });

    renderProducts();
    renderCart();
  </script>
</body>
</html>
